<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Kirish</title>
    <link rel="stylesheet" href="../css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box" id="login-box">
            <div class="login-header">
                <i class="fas fa-lock"></i>
                <h2>Admin Panel</h2>
                <p>Tizimga kirish uchun ma'lumotlarni kiriting</p>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Login</label>
                    <input type="text" id="username" placeholder="Login kiriting" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-key"></i> Parol</label>
                    <input type="password" id="password" placeholder="Parol kiriting" required>
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Kirish
                </button>
            </form>
            <p id="error-msg" style="color:red; text-align:center; margin-top:10px; display:none;"></p>
            <a href="/" class="back-link">
                <i class="fas fa-arrow-left"></i> Bosh sahifaga qaytish
            </a>
        </div>

        <div class="login-box" id="change-creds-box" style="display:none;">
            <div class="login-header">
                <i class="fas fa-user-shield"></i>
                <h2>Xavfsizlik</h2>
                <p>Xavfsizlik uchun yangi login va parol kiriting</p>
            </div>
            <form id="change-creds-form">
                <div class="form-group">
                    <label>Yangi Login</label>
                    <input type="text" id="new_username" required>
                </div>
                <div class="form-group">
                    <label>Yangi Parol</label>
                    <input type="password" id="new_password" required>
                </div>
                <button type="submit" class="btn-login">Saqlash</button>
            </form>
            <p id="creds-error-msg" style="color:red; text-align:center; margin-top:10px; display:none;"></p>
        </div>
    </div>

    <script>
        let currentUsername = '';
        let currentPassword = '';

        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                
                if (res.ok) {
                    const data = await res.json();
                    if (data.status === 'requires_password_change') {
                        currentUsername = username;
                        currentPassword = password;
                        document.getElementById('login-box').style.display = 'none';
                        document.getElementById('change-creds-box').style.display = 'block';
                    } else if (data.status === 'success') {
                        localStorage.setItem('adminToken', data.token);
                        window.location.href = '/admin/dashboard';
                    }
                } else {
                    errorMsg.innerText = 'Login yoki parol noto\'g\'ri!';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.innerText = 'Xatolik yuz berdi';
                errorMsg.style.display = 'block';
            }
        });

        document.getElementById('change-creds-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const new_username = document.getElementById('new_username').value;
            const new_password = document.getElementById('new_password').value;
            const errorMsg = document.getElementById('creds-error-msg');
            
            try {
                const res = await fetch('/api/admin/change-credentials', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: currentUsername,
                        old_password: currentPassword,
                        new_username,
                        new_password
                    })
                });
                
                if (res.ok) {
                    alert('Muvaffaqiyatli saqlandi! Iltimos, yangi ma\'lumotlar bilan qayta kiring.');
                    window.location.reload();
                } else {
                    errorMsg.innerText = 'Xatolik yuz berdi!';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.innerText = 'Xatolik yuz berdi';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
